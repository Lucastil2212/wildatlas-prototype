# Render Blueprint — https://render.com/docs/blueprint-spec
services:
  - type: web
    name: manticore
    runtime: static
    buildCommand: "true"
    staticPublishPath: .
    headers:
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=86400
      - path: /*.glb
        name: Cache-Control
        value: public, max-age=604800
      - path: /*.js
        name: Cache-Control
        value: public, max-age=3600
      - path: /*.css
        name: Cache-Control
        value: public, max-age=3600
