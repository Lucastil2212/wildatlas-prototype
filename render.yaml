# Render Blueprint — https://render.com/docs/blueprint-spec
services:
  - type: web
    name: manticore
    runtime: static
    buildCommand: "true"
    staticPublishPath: .
    routes:
      # Render clean-URLs serve *.html at /path and 404 the .html URL
      - type: redirect
        source: /atlas.html
        destination: /atlas
      - type: redirect
        source: /nestvue.html
        destination: /nestvue
    headers:
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=86400
      - path: /*.glb
        name: Cache-Control
        value: public, max-age=604800
      - path: /*.js
        name: Cache-Control
        value: public, max-age=3600
      - path: /*.css
        name: Cache-Control
        value: public, max-age=3600
